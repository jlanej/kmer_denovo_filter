name: Integration Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq samtools jellyfish

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e '.[test]' || pip install -e . && pip install pytest

      - name: Run unit tests
        run: pytest tests/test_cli.py tests/test_kmer_utils.py tests/test_kraken2.py tests/test_kraken2_bed.py -v

      - name: Run VCF-mode integration tests
        run: |
          pytest tests/vcf/test_pipeline.py -v -k "not (deletion_dka or insertion_dka or decomposed_indel or decomposed_insertion)"

      - name: Run discovery-mode integration tests
        run: |
          pytest tests/discovery/test_pipeline.py -v

      - name: Run focused indel DKA coverage tests
        run: |
          pytest tests/vcf/test_pipeline.py -v -k "deletion_dka or insertion_dka or decomposed_indel or decomposed_insertion"

      - name: Run GIAB VCF-mode integration pipeline
        run: |
          mkdir -p integration_output
          kmer-denovo \
            --child   tests/data/giab/HG002_child.bam   \
            --father  tests/data/giab/HG003_father.bam  \
            --mother  tests/data/giab/HG004_mother.bam  \
            --vcf     tests/data/giab/candidates.vcf.gz  \
            --output  integration_output/annotated.vcf.gz \
            --metrics integration_output/metrics.json    \
            --summary integration_output/summary.txt    \
            --proband-id HG002

      - name: Display VCF-mode summary
        run: cat integration_output/summary.txt

      - name: Validate BED file sort order and indexability
        run: |
          echo "--- Checking BED files ---"
          # Use nullglob so the loop is skipped when no BED files exist
          # (BED files are only produced when --kraken2-db is provided)
          shopt -s nullglob
          beds=(integration_output/*.bed.gz)
          if [ ${#beds[@]} -eq 0 ]; then
            echo "No BED files found (Kraken2 DB not configured) – skipping"
          else
            for bed in "${beds[@]}"; do
              echo "Validating: $bed"
              # Check file exists and is non-empty
              [ -s "$bed" ] || { echo "FAIL: $bed is empty"; exit 1; }
              # Check tabix index exists
              [ -f "${bed}.tbi" ] || { echo "FAIL: ${bed}.tbi missing"; exit 1; }
              # Verify positions are sorted (chrom lexicographic, start numeric)
              python3 -c "
          import gzip, sys
          prev_chrom, prev_start = '', -1
          with gzip.open('$bed', 'rt') as fh:
              for line in fh:
                  if line.startswith('#'):
                      continue
                  parts = line.split('\t')
                  chrom, start = parts[0], int(parts[1])
                  if chrom == prev_chrom and start < prev_start:
                      print(f'UNSORTED: {prev_chrom}:{prev_start} followed by {chrom}:{start}')
                      sys.exit(1)
                  prev_chrom, prev_start = chrom, start
          print('  Sort order OK')
          "
              # Verify tabix can open the file
              python3 -c "
          import pysam
          tbx = pysam.TabixFile('$bed')
          contigs = list(tbx.contigs)
          tbx.close()
          print(f'  Tabix OK – contigs: {contigs}')
          "
            done
          fi
          echo "--- BED file check complete ---"

      - name: Run GIAB discovery-mode integration pipeline
        run: |
          mkdir -p integration_output_discovery
          kmer-discovery \
            --child   tests/data/giab/HG002_child.bam   \
            --father  tests/data/giab/HG003_father.bam  \
            --mother  tests/data/giab/HG004_mother.bam  \
            --ref-fasta tests/data/giab/mini_ref.fa      \
            --ref-jf  tests/data/giab/mini_ref.fa.k31.jf \
            --out-prefix integration_output_discovery/giab_discovery \
            --min-child-count 3 \
            --kmer-size 31 \
            --candidate-summary integration_output/summary.txt

      - name: Display discovery-mode summary
        run: cat integration_output_discovery/giab_discovery.summary.txt

      - name: Upload VCF-mode integration results
        uses: actions/upload-artifact@v4
        with:
          name: giab-integration-results
          path: integration_output/

      - name: Upload discovery-mode integration results
        uses: actions/upload-artifact@v4
        with:
          name: giab-discovery-results
          path: integration_output_discovery/

      - name: Update example output
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          mkdir -p tests/example_output tests/example_output_discovery
          cp integration_output/annotated.vcf.gz integration_output/annotated.vcf.gz.tbi integration_output/metrics.json integration_output/summary.txt tests/example_output/
          cp integration_output_discovery/giab_discovery.bed integration_output_discovery/giab_discovery.metrics.json integration_output_discovery/giab_discovery.summary.txt integration_output_discovery/giab_discovery.sv.bedpe tests/example_output_discovery/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/example_output/ tests/example_output_discovery/
          git diff --staged --quiet || (git commit -m "Update example output [skip ci]" && git push || echo "Push failed; example output will be updated on next successful run.")
